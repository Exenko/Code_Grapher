syntax = "proto3";

package legacy;

option java_package = "com.stresstest.legacy";

// NOTE: This file represents a type in active transition from WSDL to proto.
// LegacyEvent exists in three forms:
//   1. LegacyEvent_WSDL in wsdl/legacy_types.xml  (old wire format)
//   2. LegacyEvent_Proto here                      (new wire format)
//   3. LegacyEvent_CC in producer/legacy_encoder.h (C++ in-memory form)
// maps_to edges connect all three.

import "messages.proto";

// LegacyEventType — enum shared between WSDL and proto representations
// mirrors the WSDL EventTypeEnum in wsdl/legacy_types.xml
enum LegacyEventType {
    LEGACY_UNKNOWN  = 0;
    LEGACY_DATA     = 1;
    LEGACY_CONTROL  = 2;
    LEGACY_HEARTBEAT = 3;
}

// LegacyEvent_Proto — proto representation of the transitioning type.
// maps_to: LegacyEvent_WSDL (wsdl/legacy_types.xml)
// maps_to: LegacyEvent_CC (producer/legacy_encoder.h struct)
// contains: messages.MessageBody (replaces RawBytes payload from WSDL form)
message LegacyEvent_Proto {
    LegacyEventType  event_type = 1;
    messages.MessageBody payload   = 2;  // contains: MessageBody
    int32            version    = 3;
    string           source_id  = 4;
    uint64           timestamp  = 5;
}

// LegacySession — groups multiple LegacyEvents (proto side of WSDL session concept)
message LegacySession {
    string                   session_id = 1;
    repeated LegacyEvent_Proto events   = 2;  // contains: LegacyEvent_Proto (repeated)
    uint64                   created_at = 3;
}
