<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeGrapher</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    const GRAPH_DATA = null;
  </script>
  <style>
    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: oklch(0.08 0.025 220);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      font-family: 'JetBrains Mono', Consolas, monospace;
      gap: 20px;
    }
    #loading-logo {
      font-size: 11px;
      color: oklch(0.45 0.05 220);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    #loading-logo span {
      color: #2060a0;
    }
    #loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: oklch(0.18 0.04 220);
      border-radius: 1px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2060a0, #00d060);
      border-radius: 1px;
      animation: loading-sweep 1.8s ease-in-out infinite;
    }
    @keyframes loading-sweep {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }
    #loading-status {
      font-size: 10px;
      color: oklch(0.32 0.04 220);
      letter-spacing: 0.08em;
    }

    /* Inline tree panel styles (here so they load before graph.js) */
    #tree-panel {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 200px;
      background: oklch(0.11 0.025 220);
      border-right: 1px solid oklch(0.18 0.04 220);
      box-shadow: 4px 0 16px oklch(0 0 0 / 0.35);
      display: flex;
      flex-direction: column;
      z-index: 50;
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 11px;
      overflow: hidden;
    }
    #tree-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 8px;
      border-bottom: 1px solid oklch(0.18 0.04 220);
      color: oklch(0.45 0.05 220);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      flex-shrink: 0;
    }
    #tree-breadcrumb {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    #tree-reset {
      background: none;
      border: none;
      color: oklch(0.45 0.05 220);
      cursor: pointer;
      font-size: 11px;
      padding: 0 0 0 4px;
      flex-shrink: 0;
    }
    #tree-reset:hover { color: #00d060; }
    #tree-content {
      overflow-y: auto;
      flex: 1;
      padding: 3px 0;
    }
    .tree-item {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      cursor: pointer;
      color: oklch(0.65 0.05 220);
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-item:hover { background: oklch(0.15 0.025 220); color: oklch(0.88 0.04 220); }
    .tree-item.active { background: oklch(0.13 0.04 160); color: #00d060; }
    .tree-item .tree-icon { flex-shrink: 0; }
    .tree-item .tree-label { overflow: hidden; text-overflow: ellipsis; }
    #graph-container { margin-left: 200px; }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div id="loading-logo">Code<span>Grapher</span></div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-status">fetching graph data&hellip;</div>
  </div>

  <!-- VS Code-style directory tree panel -->
  <div id="tree-panel">
    <div id="tree-header">
      <span id="tree-breadcrumb">explorer</span>
      <button id="tree-reset" title="Reset filter" style="display:none;">&#x2715;</button>
    </div>
    <div id="tree-content"></div>
  </div>

  <div id="graph-container">
    <div id="controls">
      <input id="search" type="text" placeholder="search nodes&hellip;" autocomplete="off" spellcheck="false">
      <button class="filter-btn" data-type="stdlib" title="Toggle stdlib/external nodes">stdlib</button>
      <button class="filter-btn" data-type="symbol" title="Toggle symbol nodes">symbols</button>
      <button class="filter-btn" data-relation="imports" title="Toggle imports edges">imports</button>
      <button class="filter-btn" data-relation="defines" title="Toggle defines edges">defines</button>
      <button class="filter-btn" data-relation="calls" title="Toggle calls edges">calls</button>
      <button class="filter-btn" data-relation="contains" title="Toggle contains edges">contains</button>
      <span id="stats"></span>
      <span id="feature-title"></span>
    </div>
    <svg id="graph"></svg>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">Node Inspector</div>
    <div id="sidebar-content"></div>
    <div id="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#04101e;border-color:#2060a0"></div>
        <span>file</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#041208;border-color:#208040"></div>
        <span>symbol</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#0e0420;border-color:#7030a8"></div>
        <span>type</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#160900;border-color:#d07020"></div>
        <span>test</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#0a0a12;border-color:#1e1e30"></div>
        <span>stdlib</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#050c1e;border-color:#1a3a70"></div>
        <span>dir</span>
      </div>
    </div>
  </div>

  <div id="diagram-panel" style="display:none;">
    <div id="diagram-resize"></div>
    <div id="diagram-header">
      <span class="dh-prefix">//</span>
      <span id="diagram-tab-bar">
        <button class="diag-tab active" data-tab="flowchart">Flowchart</button>
        <button class="diag-tab" data-tab="dataflow">Data Flow</button>
        <button class="diag-tab" data-tab="state">State</button>
      </span>
      <span style="flex:1"></span>
      <label id="diagram-zoom-label">zoom
        <input id="diagram-zoom" type="range" min="20" max="2000" value="100">
        <span id="diagram-zoom-val">100%</span>
      </label>
      <button id="diagram-zoom-reset">1:1</button>
      <button id="diagram-minimize" title="Minimize">&#x2212;</button>
      <button id="diagram-fullscreen" title="Toggle full width">&#x2922;</button>
      <button id="diagram-close" title="Close [Esc]">&#x2715; esc</button>
    </div>
    <div id="diagram-body">
      <div class="diag-pane active" id="pane-flowchart">
        <div class="diag-scroll"><div class="diag-content"></div></div>
      </div>
      <div class="diag-pane" id="pane-dataflow">
        <div class="diag-scroll"><div class="diag-content"></div></div>
      </div>
      <div class="diag-pane" id="pane-state">
        <div class="diag-scroll"><div class="diag-content"></div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
  <script src="d3.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
