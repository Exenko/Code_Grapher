<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeGrapher</title>
  <link rel="stylesheet" href="styles.css">
<script>
// LOD fetch bootstrap — graph data is loaded progressively by graph.js
// GRAPH_DATA is null when served via serve.py; graph.js checks and fetches accordingly
const GRAPH_DATA = null;
</script>
<div id="loading" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#8899bb;font-family:monospace;font-size:14px;z-index:999;">
  Loading graph data…
</div>
</head>
<body>
  <!-- Diagram overlay panel for flow/type diagrams -->
  <div id="diagram-panel" style="display:none;position:fixed;top:0;right:0;bottom:0;width:75%;background:#0d0f1a;border-left:2px solid #2a3050;z-index:100;overflow:hidden;box-sizing:border-box;flex-direction:column;">
    <!-- Drag-resize handle on left edge -->
    <div id="diagram-resize" style="position:absolute;left:0;top:0;bottom:0;width:5px;cursor:ew-resize;background:transparent;z-index:101;" title="Drag to resize"></div>
    <!-- Toolbar -->
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #2a3050;flex-shrink:0;flex-wrap:wrap;">
      <span id="diagram-title" style="color:#8899bb;font-family:monospace;font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <label style="color:#8899bb;font-family:monospace;font-size:11px;white-space:nowrap;">
        zoom
        <input id="diagram-zoom" type="range" min="20" max="500" value="100" style="width:90px;vertical-align:middle;accent-color:#6a3aaf;">
        <span id="diagram-zoom-val" style="color:#ccd;min-width:32px;display:inline-block;">100%</span>
      </label>
      <button id="diagram-zoom-reset" style="background:#1e2236;color:#8899bb;border:1px solid #2a3050;padding:3px 7px;border-radius:3px;cursor:pointer;font-family:monospace;font-size:11px;" title="Reset zoom">1:1</button>
      <button id="diagram-fullscreen" style="background:#1e2236;color:#8899bb;border:1px solid #2a3050;padding:3px 7px;border-radius:3px;cursor:pointer;font-family:monospace;font-size:11px;" title="Toggle full width">⤢</button>
      <button id="diagram-close" style="background:#1e2236;color:#8899bb;border:1px solid #2a3050;padding:3px 8px;border-radius:3px;cursor:pointer;font-family:monospace;font-size:11px;">✕</button>
    </div>
    <!-- Scrollable content area -->
    <div id="diagram-scroll" style="overflow:auto;flex:1;padding:12px;">
      <div id="diagram-content" style="transform-origin:top left;"></div>
    </div>
  </div>

  <div id="graph-container">
    <div id="controls">
      <input id="search" type="text" placeholder="Search nodes…" autocomplete="off">
      <button class="filter-btn" data-type="stdlib" title="Toggle stdlib/external imports">hide stdlib</button>
      <button class="filter-btn" data-type="symbol" title="Toggle symbol nodes">hide symbols</button>
      <button class="filter-btn" data-relation="imports" title="Toggle imports edges">hide imports</button>
      <button class="filter-btn" data-relation="defines" title="Toggle defines edges">hide defines</button>
      <button class="filter-btn" data-relation="calls" title="Toggle calls edges">hide calls</button>
      <button class="filter-btn" data-relation="contains" title="Toggle contains edges">hide contains</button>
      <span id="stats"></span>
      <span id="feature-title" style="font-size:11px;color:#4a5270;margin-left:8px;"></span>
    </div>
    <svg id="graph"></svg>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">Node Inspector</div>
    <div id="sidebar-content"></div>
    <div id="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#2a4a7a;border-color:#4a90d9"></div>
        <span>file</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1a3a2a;border-color:#5cb85c"></div>
        <span>symbol</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#2a1a3a;border-color:#9b59b6"></div>
        <span>type</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#3a2a1a;border-color:#e67e22"></div>
        <span>test</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1e1e1e;border-color:#555"></div>
        <span>stdlib</span>
      </div>
    </div>
  </div>

  <!-- Mermaid for state/class diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
  <!-- D3 v7 from CDN — requires internet on first load only -->
  <script src="d3.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
